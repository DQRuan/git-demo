<!DOCTYPE html>
<!-- 声明文档为HTML5 -->
<html lang="zh-CN">
<!-- lang="zh-CN" 页面语言中文 -->
<head>
    <!-- 字符编码，防止中文乱码 -->
    <meta charset="UTF-8">
    <!-- 移动端自适应适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 网页标题（浏览器标签显示） -->
    <title>第一次修改</title>
    <!-- 页面样式写在这里 -->
    <style>
        /* 简单居中样式示例 */
        body {
            text-align: center;
            margin-top: 100px;
        }
    </style>
</head>
<body>
    <!-- 页面可见内容全部写在body内 -->
    <h1>我的HTML页面</h1>
    <p>最简单的基础框架</p>

    <!-- JS代码推荐放在body末尾，页面加载更快 -->
    <script>
        // 这里写JavaScript代码
        console.log('页面加载完成');
    </script>
</body>
</html>
